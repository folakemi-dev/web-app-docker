version: "3.9"

services:
  web:
    build: .
    container_name: my-web-app
    ports:
      - "8000:8000"
    environment:
        APP_PORT: 8000
        APP_MESSAGE: "Hello from Docker Compose Environment!"

    depends_on:
      - db

  db:
    image: postgres:15
    container_name: my-postgres
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: mydatabase
    ports:
      - "5432:5432"

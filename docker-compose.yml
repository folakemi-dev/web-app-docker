version: "3.9"

services:
  web:
    build: .
    container_name: my-web-app
    ports:
      - "${APP_PORT:-8000}:${APP_PORT:-8000}"
    environment:
      APP_PORT: ${APP_PORT:-8000}
      APP_MESSAGE: ${APP_MESSAGE:-Hello from Docker Compose Environment!}
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: my-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-locally}
      POSTGRES_DB: ${POSTGRES_DB:-app_database}
    ports:
      - "5432:5432"
